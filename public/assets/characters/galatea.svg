<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 300" width="200" height="300">
  <defs>
    <linearGradient id="dressGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f8f0ff"/>
      <stop offset="100%" stop-color="#d4b8ff"/>
    </linearGradient>
    <linearGradient id="hairGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#d4c8e8"/>
    </linearGradient>
  </defs>
  <!-- Wings -->
  <ellipse cx="62" cy="185" rx="28" ry="16" fill="#e8d4ff" opacity="0.5" transform="rotate(-30 62 185)"/>
  <ellipse cx="138" cy="185" rx="28" ry="16" fill="#e8d4ff" opacity="0.5" transform="rotate(30 138 185)"/>
  <!-- Dress -->
  <ellipse cx="100" cy="230" rx="52" ry="60" fill="url(#dressGrad)" opacity="0.9"/>
  <ellipse cx="100" cy="200" rx="28" ry="40" fill="#f0e8ff" opacity="0.95"/>
  <ellipse cx="100" cy="248" rx="50" ry="42" fill="#ecdeff" opacity="0.85"/>
  <!-- Neck -->
  <rect x="92" y="148" width="16" height="20" rx="6" fill="#f5d5c0"/>
  <!-- Head -->
  <ellipse cx="100" cy="120" rx="38" ry="42" fill="#f5d5c0"/>
  <!-- Hair -->
  <ellipse cx="100" cy="98" rx="40" ry="28" fill="url(#hairGrad)"/>
  <ellipse cx="68" cy="125" rx="16" ry="38" fill="url(#hairGrad)" opacity="0.9"/>
  <ellipse cx="132" cy="125" rx="16" ry="38" fill="url(#hairGrad)" opacity="0.9"/>
  <ellipse cx="72" cy="175" rx="14" ry="35" fill="url(#hairGrad)" opacity="0.7"/>
  <ellipse cx="128" cy="175" rx="14" ry="35" fill="url(#hairGrad)" opacity="0.7"/>
  <ellipse cx="100" cy="88" rx="36" ry="18" fill="#ffffff" opacity="0.9"/>
  <!-- Tiara -->
  <rect x="76" y="82" width="48" height="8" rx="4" fill="#d4b8ff" opacity="0.9"/>
  <polygon points="98,82 102,66 106,82" fill="#c8aaff"/>
  <circle cx="102" cy="68" r="4" fill="#e0d0ff" opacity="0.95"/>
  <!-- Eyes -->
  <ellipse cx="88" cy="122" rx="8" ry="7" fill="white"/>
  <ellipse cx="112" cy="122" rx="8" ry="7" fill="white"/>
  <ellipse cx="88" cy="123" rx="5" ry="5" fill="#9b7fd4"/>
  <ellipse cx="112" cy="123" rx="5" ry="5" fill="#9b7fd4"/>
  <circle cx="88" cy="122" r="3" fill="#6a4a9a"/>
  <circle cx="112" cy="122" r="3" fill="#6a4a9a"/>
  <circle cx="90" cy="120" r="1.5" fill="white"/>
  <circle cx="114" cy="120" r="1.5" fill="white"/>
  <!-- Eyebrows -->
  <path d="M81 116 Q88 112 95 116" stroke="#9b7fd4" stroke-width="1.5" fill="none"/>
  <path d="M105 116 Q112 112 119 116" stroke="#9b7fd4" stroke-width="1.5" fill="none"/>
  <!-- Mouth -->
  <path d="M92 142 Q100 150 108 142" stroke="#c88080" stroke-width="2" fill="none" stroke-linecap="round"/>
  <!-- Blush -->
  <ellipse cx="78" cy="132" rx="8" ry="4" fill="#ffb8b8" opacity="0.35"/>
  <ellipse cx="122" cy="132" rx="8" ry="4" fill="#ffb8b8" opacity="0.35"/>
  <!-- Music note -->
  <text x="148" y="145" font-size="18" fill="#c8aaff" opacity="0.7">♪</text>
  <text x="36" y="160" font-size="14" fill="#c8aaff" opacity="0.5">♫</text>
  <!-- Name -->
  <text x="100" y="293" text-anchor="middle" fill="#d4b8ff" font-size="12" font-family="sans-serif" font-weight="bold">Галатея</text>
</svg>
